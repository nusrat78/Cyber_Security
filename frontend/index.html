<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Authentication System</title>
    <link rel="stylesheet" href="secure-styles.css">
</head>
<body>
    <div class="container">
        <!-- Background -->
        <div class="background">
            <div class="stars"></div>
            <div class="forest"></div>
        </div>

        <!-- Main Content -->
        <div class="form-container">
            <div style="text-align: center; padding: 40px 20px;">
                <h1>🔐 Secure Authentication System</h1>
                <p class="subtitle">Enterprise-Grade Security</p>

                <div style="margin: 60px 0; display: flex; flex-direction: column; gap: 20px; max-width: 300px; margin-left: auto; margin-right: auto;">
                    <a href="login.html" style="
                        display: inline-block;
                        padding: 15px 40px;
                        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                        color: white;
                        text-decoration: none;
                        border-radius: 8px;
                        font-size: 18px;
                        font-weight: bold;
                        transition: transform 0.3s ease, box-shadow 0.3s ease;
                        box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
                        border: none;
                        cursor: pointer;
                    "
                    onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 15px 40px rgba(102, 126, 234, 0.5)';"
                    onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 10px 30px rgba(102, 126, 234, 0.3)';">
                        🔑 Login
                    </a>

                    <a href="register.html" style="
                        display: inline-block;
                        padding: 15px 40px;
                        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
                        color: white;
                        text-decoration: none;
                        border-radius: 8px;
                        font-size: 18px;
                        font-weight: bold;
                        transition: transform 0.3s ease, box-shadow 0.3s ease;
                        box-shadow: 0 10px 30px rgba(245, 87, 108, 0.3);
                        border: none;
                        cursor: pointer;
                    "
                    onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 15px 40px rgba(245, 87, 108, 0.5)';"
                    onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 10px 30px rgba(245, 87, 108, 0.3)';">
                        📝 Create Account
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
